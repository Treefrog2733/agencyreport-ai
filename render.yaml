services:
  - type: web
    name: agencyreport-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_SSL
        value: "true"
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: EMAIL_PROVIDER
        value: resend
      - key: PAYMENT_PROVIDER
        value: ecpay
      - key: ECPAY_MODE
        value: production
      - key: APP_BASE_URL
        value: https://app.virtualtrendworks.com
      - key: ECPAY_RETURN_URL
        value: https://app.virtualtrendworks.com/api/billing/ecpay/return
      - key: ECPAY_ORDER_RESULT_URL
        value: https://app.virtualtrendworks.com/billing/ecpay/result
      - key: ECPAY_CLIENT_BACK_URL
        value: https://app.virtualtrendworks.com
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: AUTH_RATE_LIMIT_MAX
        value: "20"
      - key: LEGAL_VERSION
        value: legal-2026-06-18
      - key: LEGAL_REVIEWED
        value: "false"
      - key: BACKUP_ENABLED
        value: "true"
      - key: BACKUP_POLICY_URL
        value: https://github.com/Treefrog2733/agencyreport-ai/actions/workflows/database-backup.yml
      - key: MONITORING_URL
        value: https://github.com/Treefrog2733/agencyreport-ai/actions/workflows/production-smoke.yml
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: WORKER_SECRET
        sync: false
      - key: ECPAY_MERCHANT_ID
        sync: false
      - key: ECPAY_HASH_KEY
        sync: false
      - key: ECPAY_HASH_IV
        sync: false
