services:
  - type: web
    name: agencyreport-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_SSL
        value: "true"
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: EMAIL_PROVIDER
        value: resend
      - key: PAYMENT_PROVIDER
        value: mock
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: WORKER_SECRET
        sync: false
