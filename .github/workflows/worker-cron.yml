name: AgencyReport Worker

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled reports
        run: |
          curl --fail-with-body \
            --request POST \
            --header "x-worker-secret: ${{ secrets.WORKER_SECRET }}" \
            "${{ secrets.APP_URL }}/api/worker/run"
