name: AgencyReport Worker

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_URL: ${{ secrets.APP_URL || 'https://app.virtualtrendworks.com' }}
  WORKER_SECRET: ${{ secrets.WORKER_SECRET }}

jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Validate worker secret
        shell: bash
        run: |
          if [[ -z "$WORKER_SECRET" ]]; then
            echo "::error::Add WORKER_SECRET in repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Trigger schedules and data connectors
        shell: bash
        run: |
          response="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "x-worker-secret: $WORKER_SECRET" \
            "$APP_URL/api/worker/run")"
          node -e 'const body=JSON.parse(process.argv[1]); const item=body.item||{}; console.log(`Report schedules: ${item.scheduleProcessed||0}; connector sources: ${item.connectorProcessed||0}; connector jobs: ${(item.connectorJobIds||[]).length}; connector failures: ${(item.connectorFailures||[]).length}; scheduled AI runs: ${(item.aiRunIds||[]).length}; connector AI runs: ${(item.connectorAiRunIds||[]).length}; emails: ${(item.emailJobIds||[]).length}`); if ((item.connectorFailures||[]).length) console.log(JSON.stringify(item.connectorFailures));' "$response"
