name: AgencyReport Production Smoke

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "Production URL to test"
        required: false
        default: "https://app.virtualtrendworks.com"
  schedule:
    - cron: "40 0 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production smoke test
        env:
          APP_URL: ${{ inputs.app_url || secrets.APP_URL || 'https://app.virtualtrendworks.com' }}
        run: npm run smoke:prod -- --url "$APP_URL" --strict
