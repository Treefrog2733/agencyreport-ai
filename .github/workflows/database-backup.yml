name: Encrypted Database Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "20 18 * * *"

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate backup secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        shell: bash
        run: |
          missing=()
          [[ -n "$DATABASE_URL" ]] || missing+=(DATABASE_URL)
          [[ -n "$BACKUP_ENCRYPTION_KEY" ]] || missing+=(BACKUP_ENCRYPTION_KEY)
          if (( ${#missing[@]} )); then
            echo "::error::Add repository Actions secrets: ${missing[*]}"
            exit 1
          fi
      - name: Export, encrypt, and verify PostgreSQL backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_OUTPUT_DIR: ${{ runner.temp }}/agencyreport-backups
        run: npm run db:backup
      - name: Run transactional restore drill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_OUTPUT_DIR: ${{ runner.temp }}/agencyreport-backups
        shell: bash
        run: |
          backup_file="$(find "$BACKUP_OUTPUT_DIR" -maxdepth 1 -name '*.backup.enc.json' -type f -print -quit)"
          if [[ -z "$backup_file" ]]; then
            echo "::error::Encrypted backup file was not created"
            exit 1
          fi
          npm run db:restore:drill -- --file "$backup_file"
      - name: Retain encrypted backup
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: agencyreport-db-${{ github.run_id }}
          path: ${{ runner.temp }}/agencyreport-backups/*.backup.enc.json
          retention-days: 30
          if-no-files-found: error
